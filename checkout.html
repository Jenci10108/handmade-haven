<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Handmade Haven - Checkout</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<script src="https://checkout.razorpay.com/v1/checkout.js">

</script>
</head>


<body>


<header>

<div class="top-navbar">

<div class="logo">

<h2>
<i class="fa-solid fa-heart"></i>
Handmade Haven
</h2>

</div>


<div class="nav-item">

<a href="index.html">

<i class="fa-solid fa-house"></i>

<span>Home</span>

</a>

</div>


</div>

</header>




<!-- CHECKOUT FORM -->


<section class="checkout">


<h1>Complete Your Order 🛍️</h1>


<div class="checkout-box">


<form id="orderForm">


<label>
Full Name
</label>

<input type="text" id="name" placeholder="Enter your name">



<label>
Mobile Number
</label>

<input type="tel" id="phone" placeholder="Enter mobile number">



<label>
Email
</label>

<input type="email" id="email" placeholder="Enter email">



<label>
Delivery Address
</label>

<textarea id="address" placeholder="Enter full address"></textarea>



<label>
Payment Method
</label>


<select id="payment">


<option>
Cash on Delivery
</option>


<option>
UPI Payment
</option>


<option>
Bank Transfer
</option>


</select>


<label>
Coupon Code
</label>


<input type="text"
id="coupon"
placeholder="Enter coupon code">
<button onclick="applyCoupon()"
class="cart-btn">

Apply Coupon

</button>
<button type="button" onclick="makePayment()" class="buy-btn">

Pay Now

</button>


</form>


</div>


</section>
<section class="gallery">


<h2>
Our Handmade Creations
</h2>


<div class="gallery-box">


<img src="images/product1.jpg">

<img src="images/product2.jpg">

<img src="images/product3.jpg">

<img src="images/product4.jpg">


</div>


</section>



<footer>


<p class="copyright">

© 2026 Handmade Haven | Handmade Products With Love ❤️

</p>


</footer>




<script>

document.getElementById("orderForm")
.addEventListener("submit",function(e){

e.preventDefault();


let name =
document.getElementById("name").value;


let phone =
document.getElementById("phone").value;


let email =
document.getElementById("email").value;


let address =
document.getElementById("address").value;


let payment =
document.getElementById("payment").value;



if(name==="" || phone==="" || address===""){


alert("Please fill all details");

return;

}



let cart =
JSON.parse(localStorage.getItem("cart")) || [];



let products="";


cart.forEach((item)=>{


products += 
item.name + 
" - " +
item.price +
"%0A";


});



let message =

"New Handmade Haven Order%0A%0A"+

"Customer Name: "+name+
"%0A"+

"Mobile: "+phone+
"%0A"+

"Email: "+email+
"%0A"+

"Address: "+address+
"%0A"+

"Payment: "+payment+
"%0A%0A"+

"Products:%0A"+
products;



let yourEmail = 
"jencipatel10108@gmail.com";



window.location.href =

"mailto:"+yourEmail+
"?subject=New Handmade Haven Order"+
"&body="+message;



localStorage.removeItem("cart");


});
let orderId = 
"HH" + Math.floor(Math.random()*100000);



orders.push({

orderId: orderId,

name:name,

phone:phone,

email:email,

address:address,

payment:payment,

status:"Order Confirmed"


});


</script>

<script>


function makePayment(){


let options = {


key:"YOUR_RAZORPAY_KEY",


amount:50000,


currency:"INR",


name:"Handmade Haven",


description:"Handmade Craft Purchase",



handler:function(response){


alert(

"Payment Successful 🎉\nPayment ID: "

+ response.rzp_test_00009

);



localStorage.removeItem("cart");


window.location.href="index.html";


},



prefill:{


name:document.getElementById("name").value,


email:document.getElementById("email").value,


contact:document.getElementById("phone").value


},



theme:{


color:"#ff9900"


}


};



let paymentObject = 

new Razorpay(options);



paymentObject.open();



}


</script>


</body>

</html>
