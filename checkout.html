<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Handmade Haven - Checkout</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>


<body>


<header>

<div class="top-navbar">

<div class="logo">

<h2>
<i class="fa-solid fa-heart"></i>
Handmade Haven
</h2>

</div>


<div class="nav-item">

<a href="index.html">

<i class="fa-solid fa-house"></i>

<span>Home</span>

</a>

</div>


</div>

</header>




<!-- CHECKOUT FORM -->
<section class="checkout">

<h1>Complete Your Order 🛍️</h1>

<div class="checkout-box">

<form action="https://formsubmit.co/jencipatel10108@gmail.com" method="POST">

    <input type="hidden" name="_subject" value="New Order from Handmade Haven">
    <input type="hidden" name="_captcha" value="false">
    <input type="hidden" name="_template" value="table">

    <label>Customer Name</label>
    <input type="text" name="name" placeholder="Customer Name" required>

    <label>Email</label>
    <input type="email" name="email" placeholder="Customer Email" required>

    <label>Phone Number</label>
    <input type="tel" name="phone" placeholder="Phone Number" required>

    <label>Product Name</label>
    <input type="text" name="product" placeholder="Product Name" required>

    <label>Quantity</label>
    <input type="number" name="quantity" placeholder="Quantity" value="1" min="1" required>

    <label>Delivery Address</label>
    <textarea name="address" placeholder="Delivery Address" required></textarea>

    <button type="submit" class="buy-btn">
        Place Order 🛒
    </button>



</form>


</div>
</section>
<footer>


<p class="copyright">

© 2026 Handmade Haven | Handmade Products With Love ❤️

</p>


</footer>







</body>

</html>
