<!DOCTYPE html>
<html>

<head>

<title>
Handmade Haven Wishlist
</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<section class="products">


<h2>
My Wishlist ❤️
</h2>


<div id="wishlistBox"
class="product-grid">

</div>


</section>




<script>


let wishlist =

JSON.parse(localStorage.getItem("wishlist")) || [];



let box =

document.getElementById("wishlistBox");



wishlist.forEach((item,index)=>{


box.innerHTML += `


<div class="product-card">


<img src="${item.image}">


<h3>${item.name}</h3>


<p class="price">

${item.price}

</p>


<button class="cart-btn">

Add To Cart

</button>


<button class="buy-btn"

onclick="removeWishlist(${index})">

Remove

</button>


</div>


`;


});




function removeWishlist(index){


wishlist.splice(index,1);



localStorage.setItem(

"wishlist",

JSON.stringify(wishlist)

);


location.reload();


}


</script>


</body>

</html>
