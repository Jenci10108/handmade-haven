<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Custom Order | Handmade Haven</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<header>

<div class="top-navbar">

<div class="logo">
<a href="index.html">
<img src="logo.svg" class="logo-img" alt="Handmade Haven">
</a>
</div>

</div>

</header>


<section class="checkout">

<h1>✨ Request a Custom Handmade Order ✨</h1>

<div class="checkout-box">

<form id="customOrderForm">

<label>Full Name</label>
<input type="text" id="name" required>

<label>Email</label>
<input type="email" id="email" required>

<label>Mobile Number</label>
<input type="tel" id="phone" required>

<label>Address</label>

<textarea id="address"
placeholder="delivery address"></textarea>


<label>Select Product</label>

<select id="product">

<option>Greeting Card</option>
<option>Explosion Box</option>
<option>Scrapbook</option>
<option>Paper Craft</option>
<option>Photo Album</option>
<option>Gift Box</option>
<option>Other</option>

</select>

<label>Occasion</label>

<select id="occasion">

<option>Birthday</option>
<option>Anniversary</option>
<option>Wedding</option>
<option>Baby Shower</option>
<option>Festival</option>
<option>Valentine</option>
<option>Other</option>

</select>

<label>Color / Theme</label>

<input type="text"
id="theme"
placeholder="Example: Pink & White, Floral Theme">

<label>Text to Write on Product</label>

<textarea id="message"
placeholder="Write the message you want on the card or gift"></textarea>

<label>Special Instructions</label>

<textarea id="instruction"
placeholder="Describe your custom idea"></textarea>

<label>Required Delivery Date</label>

<input type="date" id="date">

<button type="submit" class="buy-btn">

Send Custom Order Request

</button>

</form>

</div>

</section>

<script>

document.getElementById("customOrderForm")
.addEventListener("submit",function(e){

e.preventDefault();

let name=document.getElementById("name").value;
let email=document.getElementById("email").value;
let phone=document.getElementById("phone").value;
let address=document.getElementById("address").value;
let product=document.getElementById("product").value;
let occasion=document.getElementById("occasion").value;
let theme=document.getElementById("theme").value;
let message=document.getElementById("message").value;
let instruction=document.getElementById("instruction").value;
let date=document.getElementById("date").value;

let body =
"New Custom Order Request%0A%0A"+
"Name: "+name+"%0A"+
"Email: "+email+"%0A"+
"Phone: "+phone+"%0A%0A"+
"Address: "+address+"%0A"+
"Product: "+product+"%0A"+
"Occasion: "+occasion+"%0A"+
"Theme: "+theme+"%0A"+
"Message: "+message+"%0A"+
"Special Instructions: "+instruction+"%0A"+
"Delivery Date: "+date;

let yourEmail="jncvptl09@gmail.com";

window.location.href=
"mailto:"+yourEmail+
"?subject=Custom Handmade Order Request&body="+body;

});

</script>

</body>

</html>
