<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Handmade Haven - Product</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>


<body>


<header>

<div class="top-navbar">

<div class="logo">

<a href="index.html">

<img src="logo.svg" class="logo-img">

</a>

</div>


<a href="cart.html" class="nav-item">

<i class="fa-solid fa-cart-shopping"></i>

<span>Cart</span>

</a>


</div>

</header>



<section class="product-details">


<div class="product-image">

<img id="productImage" src="" alt="Product">


</div>



<div class="product-info">


<h1 id="productName"></h1>


<div class="rating">
⭐⭐⭐⭐⭐
</div>


<h2 id="productPrice"></h2>


<p id="productDescription"></p>


<button class="cart-btn" id="productCartBtn">
Add To Cart
</button>

<button class="buy-btn" id="productBuyBtn">
Buy Now
</button>

</div>


</section>


<footer>

<p class="copyright">

© 2026 Handmade Haven ❤️

</p>

</footer>

<script>
const product = JSON.parse(localStorage.getItem("selectedProduct"));

console.log(product);

if(product){

    document.getElementById("productImage").src = product.image;
    document.getElementById("productName").textContent = product.name;
    document.getElementById("productPrice").textContent = product.price;
    document.getElementById("productDescription").textContent = product.description;

}else{

    alert("No product found.");
}
// Add to Cart
document.getElementById("productCartBtn").addEventListener("click", function () {

    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    cart.push(product);

    localStorage.setItem("cart", JSON.stringify(cart));

    alert(product.name + " added to cart 🛒");

});

// Buy Now
document.getElementById("productBuyBtn").addEventListener("click", function () {

    alert("Proceeding to checkout for " + product.name);

    window.location.href = "checkout.html";

});
</script>

<script src="script.js"></script>


</body>

</html>
