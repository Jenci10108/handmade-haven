<!DOCTYPE html>
<html>

<head>

<title>
My Profile - Handmade Haven
</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<section class="account-features">


<div class="account-card">


<h1>
My Profile 👤
</h1>


<p id="profileData"></p>



<button onclick="logout()"
class="cart-btn">

Logout

</button>


</div>


</section>




<script>


let user =

JSON.parse(localStorage.getItem("userAccount"));



document.getElementById("profileData")

.innerHTML=`

Name: ${user.name}

<br><br>

Email: ${user.email}

`;



function logout(){


localStorage.removeItem("login");


alert("Logged out");


window.location.href="index.html";


}


</script>


</body>

</html>
