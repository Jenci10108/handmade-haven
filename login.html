<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Handmade Haven - Login</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>


<body>


<header>

<div class="top-navbar">


<div class="logo">

<img src="logo.svg" class="logo-img" alt="Handmade Haven">

</div>


<div class="nav-item">

<a href="index.html">

<i class="fa-solid fa-house"></i>

<span>Home</span>

</a>

</div>


</div>

</header>




<!-- LOGIN SECTION -->


<section class="login-section">


<div class="login-box">


<h1>
<i class="fa-solid fa-user"></i>
My Account
</h1>



<form id="loginForm">


<label>Email</label>

<input type="email" 
id="loginEmail"
placeholder="Enter your email">



<label>Password</label>

<input type="password"
id="loginPassword"
placeholder="Enter password">



<button class="buy-btn" type="submit">

Login

</button>
<p>

New customer?

<a href="signup.html">

Create Account

</a>

</p>


<p>

New customer?

<a href="#">

Create Account

</a>

</p>



</form>


</div>


</section>




<!-- ACCOUNT FEATURES -->


<section class="account-features">


<div class="account-card">

<i class="fa-solid fa-box"></i>

<h3>Your Orders</h3>

<p>
Track and manage your handmade product orders.
</p>

</div>



<div class="account-card">

<i class="fa-solid fa-heart"></i>

<h3>Wishlist</h3>

<p>
Save your favorite crafts.
</p>

</div>



<div class="account-card">

<i class="fa-solid fa-location-dot"></i>

<h3>Address</h3>

<p>
Manage delivery address.
</p>

</div>


</section>




<footer>


<p class="copyright">

© 2026 Handmade Haven ❤️

</p>


</footer>





<script>


document.getElementById("loginForm")

.addEventListener("submit",function(e){


e.preventDefault();



let email=document.getElementById("loginEmail").value;

let password=document.getElementById("loginPassword").value;



if(email==="" || password===""){


alert("Please enter email and password");


}

else{


localStorage.setItem(

"user",

email

);


alert(

"Login successful 🎉 Welcome to Handmade Haven"

);


window.location.href="index.html";


}


});


</script>



</body>

</html>
